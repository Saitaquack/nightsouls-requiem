modId="nightsouls" 
version="1.0"
displayName="NightSouls Mod"

logoFile="icon.png" 

credits="Merci à Miizeal, Krahne, Basti_io, et à toi, qui a téléchargé NightSouls :D . Un grand merci à Krunchy pour le modèle du loup-garou. - Thanks to Miizeal, Krahne and Basti_io, and you, who downloaded NightSouls :D . A big thanks to Krunchy for the werewolf model." 

authors="Mod créé par Saitaquack. Structures par Miizeal et Krahne. - Mod created by Saitaquack. Structures by Miizeal and Krahne."

description='''
NightSouls Mod is probably one of the craziest mods you'll ever see. It started as a private joke with friends, but evolved into something so much bigger.
There are 350+ items and blocks, 35+ structures, 20 new armor sets, a LOT of weapons, a bunch of new ores, 14 new mobs, and 68 new musics from Video Games, Animes, and more... 

The mod also adds 4 new bosses : The Eye of Cthulhu, King Crimson, The Twins and Akaza. Can you defeat them all ?

There are so many references that I cannot count them all. I really just went all out with NightSouls Mod, and I hope you will enjoy it as much as I had fun making it.
'''


